<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700|Montserrat:900">
    <title>Document</title>
    <style>
        body {
            background-color: white;
        }
          
        #timer {
            color: #FFFDF1; /* 💡 전체 텍스트(days, hours 등)를 숫자가 같은 밝은 톤으로 통일했습니다. */
            text-align: center;
            text-transform: uppercase;
            font-family: 'Lato', sans-serif;
            font-size: .7em;
            letter-spacing: 5px;
        }

        .days, .hours, .minutes, .seconds {
            display: inline-block;
            padding: 20px;
            width: 100px;
            border-radius: 5px;
        }

        .days { background: #00462A; }
        .hours { background: #00462A; }
        .minutes { background: #00462A; }
        .seconds { background: #00462A; }

        .numbers {
            font-family: 'Montserrat', sans-serif;
            color: #FFFDF1;
            font-size: 4em;
            text-align: center;
        }

        /* 장식용 오브젝트 */
        .white {
            position: absolute;
            background: #eeeeee;
            height: 85px;
            width: 75px;
            left: 30%;
            top: 2%;
        }

        .red {
            position: absolute;
            background: #EF2F3C;
            left: 18%;
            top: 9%;
            height: 65px;
            width: 70px;
        }

        .blue {
            position: absolute;
            background: #276FBF;
            height: 80px;
            width: 80px;
            left: 60%;
            top: 5%;
        }
    </style>
</head>
<body>
    
<div id="timer">
    <div class="days"> 
        <div id="days" class="numbers"></div>days
    </div> 
    <div class="hours"> 
        <div id="hours" class="numbers"></div>hours
    </div> 
    <div class="minutes"> 
        <div id="minutes" class="numbers"></div>minutes
    </div> 
    <div class="seconds"> 
        <div id="seconds" class="numbers"></div>seconds
    </div> 
</div>

<script>
const myDate = new Date('Feb 12, 2028 00:00:00').getTime();

// countdown (부드러운 출력을 위해 1초(1000ms) 주기로 변경하는 것을 권장합니다)
let timer = setInterval(function() {

    const today = new Date().getTime();
    const diff = myDate - today;

    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    let minutes = Math.floor((diff / (1000 * 60)) % 60);
    let seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

}, 1000); // 💡 1에서 1000으로 변경 (실시간으로 1초씩 줄어드는 것을 확인할 수 있습니다)
</script>
</html>

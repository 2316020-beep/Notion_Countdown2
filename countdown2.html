<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700|Montserrat:900">
    <title>Document</title>
    <style>
        body {
            background-color: white;
        }
          
        #timer {
            color: #eeeeee;
            text-align: center;
            text-transform: uppercase;
            font-family: 'Lato', sans-serif;
            font-size: .7em;
            letter-spacing: 5px;
        }

        .days, .hours, .minutes, .seconds {
            display: inline-block;
            padding: 20px;
            width: 100px;
            border-radius: 5px;
        }

        .days { background: #00462A; }
        .hours { background: #00462A; }
        .minutes { background: #00462A; }
        .seconds { background: #00462A; }

        .numbers {
            font-family: 'Montserrat', sans-serif;
            color: #FFFDF1;
            font-size: 4em;
            text-align: center;
        }

        /* 장식용 스타일 */
        .white {
            position: absolute;
            background: #eeeeee;
            height: 85px;
            width: 75px;
            left: 30%;
            top: 2%;
        }

        .red {
            position: absolute;
            background: #EF2F3C;
            left: 18%;
            top: 9%;
            height: 65px;
            width: 70px;
        }

        .blue {
            position: absolute;
            background: #276FBF;
            height: 80px;
            width: 80px;
            left: 60%;
            top: 5%;
        }
    </style>
</head>
<body>
    
<div id="timer">
    <div class="days"> 
        <div id="days" class="numbers"></div>days
    </div> 
    <div class="hours"> 
        <div id="hours" class="numbers"></div>hours
    </div> 
    <div class="minutes"> 
        <div id="minutes" class="numbers"></div>minutes
    </div> 
    <div class="seconds"> 
        <div id="seconds" class="numbers"></div>seconds
    </div> 
</div>

<script>
    // 1. 목표 날짜 설정 (2028년 2월 12일 00시 00분 00초)
    const targetDate = new Date('2028-02-12T00:00:00').getTime();

    function updateTimer() {
        // 2. '현재 시간'을 매 초마다 새롭게 가져옴
        const now = new Date().getTime();

        // 3. 두 시간의 차이 계산
        const diff = targetDate - now;

        // 만약 목표 날짜가 지났다면 타이머 멈춤
        if (diff <= 0) {
            clearInterval(timerInterval);
            document.getElementById("days").innerHTML = "0";
            document.getElementById("hours").innerHTML = "0";
            document.getElementById("minutes").innerHTML = "0";
            document.getElementById("seconds").innerHTML = "0";
            return;
        }

        // 4. 남은 일, 시, 분, 초 수학 계산
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        // 5. 화면에 밀어넣기
        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;
    }

    // 처음 켰을 때 1초 딜레이 없이 바로 보여주기 위해 한 번 실행
    updateTimer();

    // 1초(1000ms)마다 주기적으로 실행
    const timerInterval = setInterval(updateTimer, 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700|Montserrat:900">
    <title>Document</title>
    <style>
        body {
            background-color: white;
        }
          
        #timer {
            color: #eeeeee;
            text-align: center;
            text-transform: uppercase;
            font-family: 'Lato', sans-serif;
            font-size: .7em;
            letter-spacing: 5px;
        }

        .days, .hours, .minutes, .seconds {
            display: inline-block;
            padding: 20px;
            width: 100px;
            border-radius: 5px;
        }

        .days {
            background: #EF2F3C;
        }

        .hours {
            background: #eeeeee;
            color: #183059;
        }

        .minutes {
            background: #276FBF;
        }

        .seconds {
            background: #F0A202;
        }

        .numbers {
            font-family: 'Montserrat', sans-serif;
            color:  #183059;
            font-size: 4em;
            text-align: center;
        }

        .white {
            position: absolute;
            background:  #eeeeee;
            height: 85px;
            width: 75px;
            left: 30%;
            top: 2%;
        }

        .red {
            position: absolute;
            background:  #EF2F3C;
            left: 18%;
            top: 9%;
            height: 65px;
            width: 70px;
        }

        .blue {
            position: absolute;
            background:  #276FBF;
            height: 80px;
            width: 80px;
            left: 60%;
            top: 5%;
        }
    </style>
</head>
<body>
    
    <div id="timer">
        <div class="days"> 
            <div id="days" class="numbers"></div>days
        </div> 
        <div class="hours"> 
            <div id="hours" class="numbers"></div>hours
        </div> 
        <div class="minutes"> 
            <div id="minutes" class="numbers"></div>minutes
        </div> 
        <div class="seconds"> 
            <div id="seconds" class="numbers"></div>seconds
        </div> 
    </div>

</body>
<script>
    // 1. 디데이 목표 날짜 설정 (2028년 2월 12일 00시 00분 00초)
    const myDate = new Date('Feb 12, 2028 00:00:00');

    // 카운트다운 함수
    function updateCountdown() {
        // 현재 시간 가져오기
        const today = new Date().getTime();

        // 남은 시간 계산 (밀리초 단위)
        const diff = myDate - today;

        // 만약 디데이에 도달하거나 지나갔을 때 처리 (음수 방지)
        if (diff <= 0) {
            clearInterval(timer);
            document.getElementById("days").innerHTML = 0;
            document.getElementById("hours").innerHTML = 0;
            document.getElementById("minutes").innerHTML = 0;
            document.getElementById("seconds").innerHTML = 0;
            return;
        }

        // 시간 수학 계산
        let days = Math.floor(diff / (1000 * 60 * 60 * 24));
        let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        let seconds = Math.floor((diff % (1000 * 60)) / 1000);

        // 화면에 표시
        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;
    }

    // 2. 페이지가 로드되자마자 한 번 실행 (처음 1초간 빈칸으로 뜨는 것 방지)
    updateCountdown();

    // 3. 1초(1000ms)마다 함수 실행
    let timer = setInterval(updateCountdown, 1000);
</script>
</html>
